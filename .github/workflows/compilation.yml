name: CI-compile

on:
  push:
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [run_build]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2max/dev:v20250725-2
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Compile -> make clean release
        run: make --trace clean release

      - name: Create detailed changelog
        run: sh ./make_changelog.sh

      - name: Upload release artifact ELF
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD
          path: |
            OPNPS2LD-*.ELF

      - name: Upload release artifact info
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: INFO
          path: |
            DETAILED_CHANGELOG
            CREDITS
            LICENSE
            README.md

  build-variants:
    strategy:
      fail-fast: false
      matrix:
        extra: [EXTRA_FEATURES=0, EXTRA_FEATURES=1]
        pademu: [PADEMU=0, PADEMU=1]
    runs-on: ubuntu-latest
    container: ps2max/dev:v20250725-2
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Get version
        run: |
          echo "OPL_VERSION=$(make oplversion)" >> "$GITHUB_ENV"

      - name: Compile -> make ${{ matrix.extra }} ${{ matrix.pademu }} ${{ matrix.extra }} NOT_PACKED=1
        run: |
          make --trace ${{ matrix.pademu }} ${{ matrix.extra }} NOT_PACKED=1
          mv opl.elf OPNPS2LD-${{ env.OPL_VERSION }}-${{ matrix.pademu }}-${{ matrix.extra }}.ELF

      - name: Create detailed changelog
        run: sh ./make_changelog.sh

      - name: Upload variants artifact ELF
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD-VARIANTS ${{ matrix.pademu }} ${{ matrix.extra }}
          path: OPNPS2LD*.ELF

  merge-variants:
    runs-on: ubuntu-latest
    needs: build-variants
    steps:
      - name: Download variant artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: OPNPS2LD-VARIANTS*
          path: merged-variants
          merge-multiple: true

      - name: Re-upload merged variants
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD-VARIANTS
          path: merged-variants

  build-lang:
    runs-on: ubuntu-latest
    container: ps2max/dev:v20250725-2
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Compile -> make download_lng languages
        run: make --trace download_lng languages

      - name: Create artifact
        run: sh ./lng_pack.sh

      - name: Upload release artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD-LANGS
          path: |
            OPNPS2LD-LANGS-*.zip

  build-debug:
    strategy:
      fail-fast: false
      matrix:
        debug: [iopcore_debug, ingame_debug, eesio_debug, iopcore_ppctty_debug, ingame_ppctty_debug, DTL_T10000=1]
        container_commit: [":v20250725-2"]
    runs-on: ubuntu-latest
    container: ps2max/dev${{ matrix.container_commit }}
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Get version
        run: |
          echo "OPL_VERSION=$(make oplversion)" >> "$GITHUB_ENV"
          SHORT_COMMIT="${{ matrix.container_commit }}"
          SHORT_COMMIT=${SHORT_COMMIT: -4}
          echo "SHORT_COMMIT=$SHORT_COMMIT" >> "$GITHUB_ENV"

      - name: Compile -> make debug
        run: |
          make ${{ matrix.debug }} --trace
          mv opl.elf opl-${{ matrix.debug }}-${{ env.OPL_VERSION }}-${{ env.SHORT_COMMIT }}.elf

      - name: Upload debug artifact ELF
        uses: actions/upload-artifact@v6
        with:
          name: opl-${{ matrix.debug }}-${{ env.OPL_VERSION }}-${{ env.SHORT_COMMIT }}
          path: opl-*.elf

  merge-debug:
    runs-on: ubuntu-latest
    needs: build-debug
    steps:
      - name: Download debug artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: opl-*
          path: merged-debug
          merge-multiple: true

      - name: Re-upload merged debug artifacts
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD-DEBUG
          path: merged-debug

  release:
    needs: [build, merge-variants, build-lang]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master'
    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - run: git fetch --prune --unshallow

      - name: Get version
        run: |
          echo "OPL_VERSION=$(make oplversion)" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Prepare artifacts for release
        run: |
          echo packing release of OPL ${{ env.OPL_VERSION }}
          cp INFO/* OPNPS2LD/
          cp INFO/* OPNPS2LD-VARIANTS/
          7z a -t7z OPNPS2LD-${{ env.OPL_VERSION }}.7z OPNPS2LD/*
          7z a -t7z OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z OPNPS2LD-VARIANTS/*
          7z a -t7z OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z OPNPS2LD-LANGS/*
          cp -f OPNPS2LD-${{ env.OPL_VERSION }}.7z OPNPS2LD.7z
          cp -f OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z OPNPS2LD-VARIANTS.7z
          cp -f OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z OPNPS2LD-LANGS.7z
          cp -f OPNPS2LD/OPNPS2LD-${{ env.OPL_VERSION }}.ELF OPNPS2LD.ELF

      - name: Create prerelease
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          prerelease: true
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          make_latest: false
          append_body: false
          files: |
            OPNPS2LD-${{ env.OPL_VERSION }}.7z
            OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z
            OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z
            OPNPS2LD.7z
            OPNPS2LD-VARIANTS.7z
            OPNPS2LD-LANGS.7z
            OPNPS2LD.ELF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.OPL_VERSION }}
          prerelease: ${{ contains(github.ref, '-rc') }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          files: |
            OPNPS2LD-${{ env.OPL_VERSION }}.7z
            OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z
            OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z
            OPNPS2LD.7z
            OPNPS2LD-VARIANTS.7z
            OPNPS2LD-LANGS.7z
            OPNPS2LD.ELF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload pre-release to Mega
        if: github.ref == 'refs/heads/master' && env.USERNAME != null
        uses: Difegue/action-megacmd@master
        with:
          args: put -c OPNPS2LD.7z /OPL/Pre-Release/${{ env.OPL_VERSION }}/run_${{ github.run_number }}/

      - name: Upload release to Mega
        if: startsWith(github.ref, 'refs/tags/v') && env.USERNAME != null
        uses: Difegue/action-megacmd@master
        with:
          args: put -c OPNPS2LD.7z /OPL/Release/${{ env.OPL_VERSION }}/
