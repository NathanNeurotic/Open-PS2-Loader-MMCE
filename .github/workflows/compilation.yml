name: CI-compile

on:
  push:
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [run_build]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2max/dev:v20250725-2
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Compile -> make clean release
        run: make --trace clean release

      - name: Create detailed changelog
        run: sh ./make_changelog.sh

      - name: Upload release artifact ELF
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD
          path: |
            OPNPS2LD-*.ELF

      - name: Upload release artifact info
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: INFO
          path: |
            DETAILED_CHANGELOG
            CREDITS
            LICENSE
            README.md


  build-ps2dev-latest:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - name: Install host dependencies (Alpine only)
        run: |
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache \
              bash \
              make \
              git \
              zip \
              unzip \
              tar \
              gzip \
              xz \
              python3 \
              py3-pip \
              py3-yaml \
              gmp \
              mpfr4 \
              libmpc1 \
              perl \
              cmake \
              pkgconf \
              coreutils \
              findutils \
              grep \
              sed \
              gawk \
              diffutils
          fi

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow || true

      - name: Compile -> make clean release
        run: make --trace clean release

      - name: Create detailed changelog
        run: sh ./make_changelog.sh

      - name: Upload release artifact ELF (ps2dev-latest)
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD-ps2dev-latest
          path: |
            OPNPS2LD-*.ELF

      - name: Upload release artifact info (ps2dev-latest)
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: INFO-ps2dev-latest
          path: |
            DETAILED_CHANGELOG
            CREDITS
            LICENSE
            README.md

  build-variants:
    strategy:
      fail-fast: false
      matrix:
        extra: [EXTRA_FEATURES=0, EXTRA_FEATURES=1]
        pademu: [PADEMU=0, PADEMU=1]
    runs-on: ubuntu-latest
    container: ps2max/dev:v20250725-2
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Get version
        run: |
          echo "OPL_VERSION=$(make oplversion)" >> "$GITHUB_ENV"

      - name: Compile -> make ${{ matrix.extra }} ${{ matrix.pademu }} ${{ matrix.extra }} NOT_PACKED=1
        run: |
          make --trace ${{ matrix.pademu }} ${{ matrix.extra }} NOT_PACKED=1
          mv opl.elf OPNPS2LD-${{ env.OPL_VERSION }}-${{ matrix.pademu }}-${{ matrix.extra }}.ELF

      - name: Create detailed changelog
        run: sh ./make_changelog.sh

      - name: Upload variants artifact ELF
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD-VARIANTS ${{ matrix.pademu }} ${{ matrix.extra }}
          path: OPNPS2LD*.ELF

  merge-variants:
    runs-on: ubuntu-latest
    needs: build-variants
    steps:
      - name: Download variant artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: OPNPS2LD-VARIANTS*
          path: merged-variants
          merge-multiple: true

      - name: Re-upload merged variants
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD-VARIANTS
          path: merged-variants

  build-lang:
    runs-on: ubuntu-latest
    container: ps2max/dev:v20250725-2
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Compile -> make download_lng languages
        run: make --trace download_lng languages

      - name: Create artifact
        run: sh ./lng_pack.sh

      - name: Upload release artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD-LANGS
          path: |
            OPNPS2LD-LANGS-*.zip

  build-debug:
    strategy:
      fail-fast: false
      matrix:
        debug: [iopcore_debug, ingame_debug, eesio_debug, iopcore_ppctty_debug, ingame_ppctty_debug, DTL_T10000=1]
        container_commit: [":v20250725-2"]
    runs-on: ubuntu-latest
    container: ps2max/dev${{ matrix.container_commit }}
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Get version
        run: |
          echo "OPL_VERSION=$(make oplversion)" >> "$GITHUB_ENV"
          SHORT_COMMIT="${{ matrix.container_commit }}"
          SHORT_COMMIT=${SHORT_COMMIT: -4}
          echo "SHORT_COMMIT=$SHORT_COMMIT" >> "$GITHUB_ENV"

      - name: Compile -> make debug
        run: |
          make ${{ matrix.debug }} --trace
          mv opl.elf opl-${{ matrix.debug }}-${{ env.OPL_VERSION }}-${{ env.SHORT_COMMIT }}.elf

      - name: Upload debug artifact ELF
        uses: actions/upload-artifact@v6
        with:
          name: opl-${{ matrix.debug }}-${{ env.OPL_VERSION }}-${{ env.SHORT_COMMIT }}
          path: opl-*.elf

  merge-debug:
    runs-on: ubuntu-latest
    needs: build-debug
    steps:
      - name: Download debug artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: opl-*
          path: merged-debug
          merge-multiple: true

      - name: Re-upload merged debug artifacts
        uses: actions/upload-artifact@v6
        with:
          name: OPNPS2LD-DEBUG
          path: merged-debug

  release:
    needs: [build, merge-variants, build-lang]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master'
    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - run: git fetch --prune --unshallow

      - name: Get version
        run: |
          echo "OPL_VERSION=$(make oplversion)" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Prepare artifacts for release
        run: |
          echo packing release of OPL ${{ env.OPL_VERSION }}
          cp INFO/* OPNPS2LD/
          cp INFO/* OPNPS2LD-VARIANTS/
          7z a -t7z OPNPS2LD-${{ env.OPL_VERSION }}.7z OPNPS2LD/*
          7z a -t7z OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z OPNPS2LD-VARIANTS/*
          7z a -t7z OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z OPNPS2LD-LANGS/*
          cp -f OPNPS2LD-${{ env.OPL_VERSION }}.7z OPNPS2LD.7z
          cp -f OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z OPNPS2LD-VARIANTS.7z
          cp -f OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z OPNPS2LD-LANGS.7z
          cp -f OPNPS2LD/OPNPS2LD-${{ env.OPL_VERSION }}.ELF OPNPS2LD.ELF

      - name: Create or update prerelease
        if: github.ref == 'refs/heads/master'
        run: |
          gh release view latest >/dev/null 2>&1 && EXISTS=1 || EXISTS=0

          if [ "$EXISTS" -eq 1 ]; then
            gh release upload latest \
              OPNPS2LD-${{ env.OPL_VERSION }}.7z \
              OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z \
              OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z \
              OPNPS2LD.7z \
              OPNPS2LD-VARIANTS.7z \
              OPNPS2LD-LANGS.7z \
              OPNPS2LD.ELF \
              --clobber
          else
            gh release create latest \
              OPNPS2LD-${{ env.OPL_VERSION }}.7z \
              OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z \
              OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z \
              OPNPS2LD.7z \
              OPNPS2LD-VARIANTS.7z \
              OPNPS2LD-LANGS.7z \
              OPNPS2LD.ELF \
              --title "latest" \
              --notes "" \
              --prerelease
          fi

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PRERELEASE_FLAG=""
          if [[ "${GITHUB_REF}" == *"-rc"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ github.ref_name }}" \
            OPNPS2LD-${{ env.OPL_VERSION }}.7z \
            OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z \
            OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z \
            OPNPS2LD.7z \
            OPNPS2LD-VARIANTS.7z \
            OPNPS2LD-LANGS.7z \
            OPNPS2LD.ELF \
            --title "${{ env.OPL_VERSION }}" \
            --notes "" \
            ${PRERELEASE_FLAG}

